name: "Update vcpkg Baseline"

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-baseline:
    name: "Check and update vcpkg baseline"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for vcpkg updates and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VCPKG_JSON="vcpkg.json"

          # Extract current baseline from vcpkg.json
          CURRENT_BASELINE=$(jq -r '."vcpkg-configuration"."default-registry".baseline' "$VCPKG_JSON")
          echo "Current baseline: $CURRENT_BASELINE"

          # Get latest commit SHA from microsoft/vcpkg
          LATEST_COMMIT=$(gh api repos/microsoft/vcpkg/commits/master --jq '.sha')
          echo "Latest vcpkg commit: $LATEST_COMMIT"

          if [ "$CURRENT_BASELINE" = "$LATEST_COMMIT" ]; then
            echo "Baseline is already up-to-date."
            exit 0
          fi

          # Collect all dependency names from vcpkg.json using jq
          # Handles both string entries and object entries with a "name" field
          DEPS=$(jq -r '
            [
              (.dependencies[]? | if type == "string" then . else .name end),
              (.features | to_entries[]? | .value.dependencies[]?
                | if type == "string" then . else .name end)
            ] | unique | sort[]
          ' "$VCPKG_JSON")
          echo "Dependencies to check:"
          echo "$DEPS"

          # Fetch baseline.json from current and latest vcpkg commits
          fetch_baseline() {
            local sha="$1"
            gh api \
              --header "Accept: application/vnd.github.raw+json" \
              "repos/microsoft/vcpkg/contents/versions/baseline.json?ref=${sha}"
          }

          fetch_baseline "$CURRENT_BASELINE" > /tmp/baseline_old.json
          fetch_baseline "$LATEST_COMMIT"    > /tmp/baseline_new.json

          # Write deps list to a file for the standalone comparison script
          echo "$DEPS" > /tmp/deps.txt

          # Compare versions using the standalone script
          CHANGED=$(.github/scripts/compare-vcpkg-baselines.py \
            /tmp/baseline_old.json /tmp/baseline_new.json /tmp/deps.txt)

          if [ -z "$CHANGED" ]; then
            echo "No dependency version changes in the new baseline."
            exit 0
          fi

          echo "Changed dependencies:"
          echo "$CHANGED"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check for an existing open PR for a vcpkg baseline update
          EXISTING_PR_JSON=$(gh pr list \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("bot/vcpkg-baseline-"))] | first | {number, headRefName} // empty')
          EXISTING_PR_NUMBER=$(echo "$EXISTING_PR_JSON" | jq -r '.number // empty')
          EXISTING_BRANCH=$(echo "$EXISTING_PR_JSON" | jq -r '.headRefName // empty')

          if [ -n "$EXISTING_BRANCH" ]; then
            # Build on top of the existing PR branch so the PR is updated in-place
            git fetch origin "$EXISTING_BRANCH"
            git checkout "$EXISTING_BRANCH"
            BRANCH="$EXISTING_BRANCH"
          else
            BRANCH="bot/vcpkg-baseline-${LATEST_COMMIT:0:10}"
            git checkout -b "$BRANCH"
          fi

          # Read the actual baseline from the checked-out branch (may differ from
          # CURRENT_BASELINE when we are updating an existing PR branch)
          BRANCH_BASELINE=$(jq -r '."vcpkg-configuration"."default-registry".baseline' "$VCPKG_JSON")

          if [ "$BRANCH_BASELINE" = "$LATEST_COMMIT" ]; then
            echo "Branch $BRANCH already has the latest baseline. Nothing to do."
            exit 0
          fi

          # Update only the baseline value in vcpkg.json (preserves original formatting)
          sed -i "s|\"baseline\": \"${BRANCH_BASELINE}\"|\"baseline\": \"${LATEST_COMMIT}\"|" "$VCPKG_JSON"

          git add "$VCPKG_JSON"

          # Write commit message to a file to avoid shell quoting issues
          printf 'chore: update vcpkg baseline to %s\n\nChanged dependencies:\n%s\n' \
            "${LATEST_COMMIT:0:10}" "$CHANGED" > /tmp/commit_msg.txt
          git commit -F /tmp/commit_msg.txt
          git push origin "$BRANCH"

          printf '## vcpkg baseline update\n\nUpdated baseline from `%s` to `%s`.\n\n### Changed dependencies\n```\n%s\n```\n\nFull vcpkg commit: https://github.com/microsoft/vcpkg/commit/%s\n' \
            "${CURRENT_BASELINE:0:10}" "${LATEST_COMMIT:0:10}" "$CHANGED" "$LATEST_COMMIT" \
            > /tmp/pr_body.txt

          if [ -n "$EXISTING_PR_NUMBER" ]; then
            # Update the existing PR title and description
            gh pr edit "$EXISTING_PR_NUMBER" \
              --title "chore: update vcpkg baseline to ${LATEST_COMMIT:0:10}" \
              --body-file /tmp/pr_body.txt
            echo "Updated existing PR #${EXISTING_PR_NUMBER}"
          else
            gh pr create \
              --title "chore: update vcpkg baseline to ${LATEST_COMMIT:0:10}" \
              --body-file /tmp/pr_body.txt \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$BRANCH" \
              --label "dependencies"
          fi
